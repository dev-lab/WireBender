name: Build and Release WireBender

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }} (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [native, wasm]
        config: [Release, Debug]

    steps:
      - name: Checkout WireBender
        uses: actions/checkout@v4
        with:
          path: WireBender

      - name: Checkout Adaptagrams (dev-lab fork)
        uses: actions/checkout@v4
        with:
          repository: dev-lab/adaptagrams
          ref: master
          path: adaptagrams

      - name: Setup Emscripten
        if: matrix.target == 'wasm'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Generate Adaptagrams config.h
        run: |
          cd adaptagrams/cola
          autoreconf -i
          if [ "${{ matrix.target }}" = "wasm" ]; then
            emconfigure ./configure
          else
            ./configure
          fi

      - name: Configure and Build
        run: |
          mkdir -p WireBender/build-${{ matrix.target }}-${{ matrix.config }}
          cd WireBender/build-${{ matrix.target }}-${{ matrix.config }}
          
          if [ "${{ matrix.target }}" = "wasm" ]; then
            emcmake cmake .. -DADAPTAGRAMS_DIR=$GITHUB_WORKSPACE/adaptagrams -DWASM_DEBUG=${{ matrix.config == 'Debug' && 'ON' || 'OFF' }}
          else
            cmake .. -DADAPTAGRAMS_DIR=$GITHUB_WORKSPACE/adaptagrams -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          fi
          
          cmake --build . --parallel $(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WireBender-${{ matrix.target }}-${{ matrix.config }}
          path: |
            WireBender/build-${{ matrix.target }}-${{ matrix.config }}/WireBender.js
            WireBender/build-${{ matrix.target }}-${{ matrix.config }}/WireBender.wasm
            WireBender/build-${{ matrix.target }}-${{ matrix.config }}/libWireBender.a
            WireBender/build-${{ matrix.target }}-${{ matrix.config }}/*.o

  deploy-pages:
    name: Update GitHub Pages Index
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Download WASM Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: WireBender-wasm-Release
          path: new_build

      - name: Organize Folders and Generate Index
        shell: python
        run: |
          import os
          import shutil
          from datetime import datetime

          root = "gh-pages"
          if not os.path.exists(root): os.makedirs(root)
          
          ref = "${{ github.ref }}"
          version = "${{ github.ref_name }}" if ref.startswith("refs/tags/") else "wip"
          
          # 1. Save the new build
          dest_dir = os.path.join(root, version)
          if os.path.exists(dest_dir): shutil.rmtree(dest_dir)
          shutil.copytree("new_build", dest_dir)

          # 2. Update 'latest' for tags
          if ref.startswith("refs/tags/"):
              latest_dir = os.path.join(root, "latest")
              if os.path.exists(latest_dir): shutil.rmtree(latest_dir)
              shutil.copytree("new_build", latest_dir)

          # 3. Security/Config files
          open(os.path.join(root, ".nojekyll"), "a").close()

          # 4. Generate HTML Index (Filtered)
          folders = []
          for d in os.listdir(root):
              path = os.path.join(root, d)
              # Ignore hidden folders (like .git) and files
              if not d.startswith('.') and os.path.isdir(path):
                  # Ensure it's actually a build folder
                  if os.path.exists(os.path.join(path, "WireBender.js")):
                      folders.append(d)
          
          # Sort: latest first, then wip, then tags in reverse
          folders.sort(reverse=True)
          if 'wip' in folders:
              folders.remove('wip')
              folders.insert(0, 'wip')
          if 'latest' in folders:
              folders.remove('latest')
              folders.insert(0, 'latest')

          links = []
          for f in folders:
              mtime = datetime.fromtimestamp(os.path.getmtime(os.path.join(root, f)))
              links.append(f'<li><strong><a href="./{f}/WireBender.js">{f}</a></strong> — <i>{mtime.strftime("%Y-%m-%d %H:%M")}</i></li>')
          
          html_content = f"""
          <!DOCTYPE html>
          <html>
          <head>
            <title>WireBender WASM Index</title>
            <style>
              body {{ font-family: -apple-system, sans-serif; line-height: 1.6; padding: 40px; color: #333; max-width: 800px; margin: 0 auto; }}
              h1 {{ border-bottom: 2px solid #eee; padding-bottom: 10px; }}
              ul {{ list-style: none; padding: 0; }}
              li {{ background: #f9f9f9; margin-bottom: 8px; padding: 12px; border-radius: 6px; border: 1px solid #eee; }}
              a {{ color: #0366d6; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              code {{ background: #eee; padding: 2px 4px; border-radius: 4px; }}
            </style>
          </head>
          <body>
            <h1>WireBender WASM Builds</h1>
            <p>Load via: <code>import WireBenderModule from 'https://dev-lab.github.io/WireBender/[version]/WireBender.js'</code></p>
            <ul>{"".join(links)}</ul>
            <hr>
            <p style="font-size: 0.8em; color: #666;">Generated: {datetime.now().strftime("%Y-%m-%d %H:%M:%S")} UTC</p>
          </body>
          </html>
          """
          with open(os.path.join(root, "index.html"), "w") as f:
              f.write(html_content)

      - name: Commit and Push to gh-pages
        run: |
          cd gh-pages
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Deploy WireBender ${{ github.ref_name }} to Pages" || echo "No changes to commit"
          git push origin gh-pages

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WireBender-*/*
          generate_release_notes: true
